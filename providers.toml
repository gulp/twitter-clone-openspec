# Provider configurations for loop-ui
# Each section name becomes the --<name> flag.
#
# Fields:
#   pass_args   — arguments to `pass` for fetching the API key
#   base_url    — ANTHROPIC_BASE_URL override
#   timeout_ms  — API_TIMEOUT_MS (default: none)
#   model       — ANTHROPIC_MODEL
#   small_fast  — ANTHROPIC_SMALL_FAST_MODEL
#   haiku       — ANTHROPIC_DEFAULT_HAIKU_MODEL
#   sonnet      — ANTHROPIC_DEFAULT_SONNET_MODEL
#   opus        — ANTHROPIC_DEFAULT_OPUS_MODEL

[claude]
# Native Claude auth — no overrides needed.
